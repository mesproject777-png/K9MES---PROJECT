<section class="reports-page" [class.menu-mode]="activeView === 'menu'" [class.todays-mode]="activeView === 'todays'">
  <ng-container *ngIf="activeView === 'menu'; else reportContent">
    <app-reports-menu [vm]="controller"></app-reports-menu>
  </ng-container>

  <ng-template #reportContent>
    <app-activity-quality-dashboard *ngIf="activeView === 'activityQuality'" [vm]="controller"></app-activity-quality-dashboard>
    <app-debug-dashboard *ngIf="activeView === 'debug'" [vm]="controller"></app-debug-dashboard>
    <app-today-dashboard *ngIf="activeView === 'todays'" [vm]="controller"></app-today-dashboard>
    <ng-container *ngIf="showStandardReportsShell">
    <div class="reports-toolbar">
      <button type="button" class="icon-button" title="Back to reports" (click)="backToMenu()">
        <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
      </button>
    </div>

    <ng-container *ngIf="activeView === 'standard'; else reportModuleView">
      <p class="message error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <section class="report-prompt" *ngIf="!report && !loading">
      <span class="material-symbols-outlined" aria-hidden="true">manage_search</span>
      <h1>Enter work order in search bar</h1>
    </section>

    <section class="report-prompt loading-prompt" *ngIf="loading">
      <span class="material-symbols-outlined" aria-hidden="true">hourglass_top</span>
      <h1>Loading work order tree...</h1>
      <p>{{ currentWorkOrder }}</p>
    </section>

      <section class="sn-result-page report-result" *ngIf="report">
      <div class="sn-result-window">
        <div class="workflow-tabs sn-tabs" role="tablist" aria-label="Standard report sections">
          <button type="button" class="workflow-tab" [class.active]="activeTab === 'tree'" (click)="activeTab = 'tree'">
            <span class="material-symbols-outlined" aria-hidden="true">account_tree</span>
            <span>{{ workOrderTabLabel }}</span>
          </button>
          <button type="button" class="workflow-tab" [class.active]="activeTab === 'station'" [disabled]="!selectedStation" (click)="activeTab = 'station'">
            <span class="material-symbols-outlined" aria-hidden="true">history</span>
            <span>{{ stationTabLabel }}</span>
          </button>
        </div>

        <div class="sn-panel-shell">
          <app-work-order-tree *ngIf="activeTab === 'tree'" [vm]="controller"></app-work-order-tree>

          <app-reports-sn-chart *ngIf="activeTab === 'station'" [vm]="controller"></app-reports-sn-chart>
        </div>
      </div>
      </section>
    </ng-container>

    <ng-template #reportModuleView>
      <app-scrap-sn *ngIf="activeView === 'scrapSn'" [vm]="controller"></app-scrap-sn>
      <app-undo-scrap *ngIf="activeView === 'undoScrap'" [vm]="controller"></app-undo-scrap>
    </ng-template>
    </ng-container>
  </ng-template>
</section>
