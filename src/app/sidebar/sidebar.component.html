<aside class="sidebar">
  <div class="sidebar-header">
    <div class="brand-mark" aria-label="K9">K9</div>
    <div class="brand-copy">
      <h2>K9</h2>
      <p>MES Workspace</p>
    </div>
  </div>

  <ul class="sidebar-links">
    <li *ngFor="let item of sidebarItems" [hidden]="!canAccess(item.pageKey)">
      <a [routerLink]="item.route" routerLinkActive="active-link">
        <span class="material-symbols-outlined">{{ item.icon }}</span>
        <span class="link-label">{{ item.label }}</span>
      </a>
    </li>

    <li>
      <a href="#" (click)="$event.preventDefault()">
        <span class="material-symbols-outlined">notifications_active</span>
        <span class="link-label">Notifications</span>
      </a>
    </li>

    <h4>
      <span>Account</span>
      <div class="menu-separator"></div>
    </h4>

    <li [hidden]="!canAccess('dashboard/profile')">
      <a routerLink="/dashboard/profile" routerLinkActive="active-link">
        <span class="material-symbols-outlined">account_circle</span>
        <span class="link-label">Profile</span>
      </a>
    </li>

    <li>
      <a href="#" (click)="$event.preventDefault()">
        <span class="material-symbols-outlined">settings</span>
        <span class="link-label">Settings</span>
      </a>
    </li>

    <li>
      <a href="#" (click)="logout(); $event.preventDefault()">
        <span class="material-symbols-outlined">logout</span>
        <span class="link-label">Logout</span>
      </a>
    </li>
  </ul>

  <div class="user-account">
    <div class="user-profile">
      <img src="https://cdn-icons-png.flaticon.com/256/9572/9572778.png" alt="Profile Image" />
      <div class="user-detail">
        <h3>{{ currentUser?.user_name || currentUser?.login_id || 'User' }}</h3>
        <span>{{ currentUser?.role_name || 'Role' }}</span>
      </div>
    </div>
  </div>
</aside>
